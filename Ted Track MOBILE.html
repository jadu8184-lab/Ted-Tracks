<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B2240">
<title>Focus Tracker</title>
<style>
  :root {
    /* AFC Richmond Colors */
    --navy: #0B2240;
    --navy-mid: #0f2b4d;
    --red: #D2122E;
    --yellow: #FBE122;
    --white: #ffffff;
    
    /* Minimalist Accents */
    --surface: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.08);
    --text-muted: rgba(255, 255, 255, 0.5);
    
    /* System variables */
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
    --tab-h: 65px;
  }

  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--navy);
    /* Clean Minimalist System Fonts */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--white);
  }

  /* ========== SHELL ========== */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: 100vh;
    background: var(--navy);
    position: relative;
    max-width: 430px;
    margin: 0 auto;
  }

  /* ========== SCROLL CONTENT ========== */
  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 20px);
  }
  .content::-webkit-scrollbar { display: none; }

  /* ========== TABS ========== */
  .tab-pane { 
    display: none; 
    padding: 20px; 
    animation: fadeIn 0.3s ease;
  }
  .tab-pane.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== BOTTOM NAV ========== */
  .bottom-nav {
    height: calc(var(--tab-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: var(--navy);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    z-index: 20;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-muted);
    transition: color 0.2s;
    position: relative;
  }
  .nav-item.active { color: var(--yellow); }
  .nav-item .nav-icon { font-size: 1.2rem; line-height: 1; filter: grayscale(1); opacity: 0.5; }
  .nav-item.active .nav-icon { filter: grayscale(0); opacity: 1; }
  .nav-item .nav-label { 
    font-size: 0.65rem; 
    font-weight: 600; 
    letter-spacing: 1px; 
    text-transform: uppercase; 
  }

  /* ========== CARDS ========== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* ========== TED SECTION (Tab 1 top) ========== */
  .ted-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 10px 20px;
  }
  
  /* Minimalist Quote */
  .quote-container {
    text-align: center;
    margin-bottom: 30px;
  }
  .quote-container p {
    font-size: 1.05rem;
    color: var(--yellow);
    font-style: italic;
    font-weight: 400;
    line-height: 1.5;
    transition: opacity 0.4s;
  }
  .quote-container p.fade { opacity: 0; }

  /* Floating Image */
  .img-wrap {
    width: 140px;
    height: 140px;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .img-wrap img {
    width: 200%;
    height: 200%;
    object-fit: contain;
  }

  /* ========== CLOCK ========== */
  .clock-wrap { text-align: center; margin-bottom: 10px; }
  .clock-display {
    font-size: 4.5rem;
    font-weight: 200;
    letter-spacing: -2px;
    color: var(--white);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: color 0.3s;
  }
  .clock-display.running { color: var(--yellow); }
  .session-label {
    margin-top: 10px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ========== CONTROLS ========== */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-top: 24px;
  }
  .btn {
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 16px 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: background 0.2s, opacity 0.1s;
  }
  .btn:active { opacity: 0.7; }
  
  .btn-start { background: var(--yellow); color: var(--navy); }
  .btn-stop { background: var(--red); color: var(--white); }
  .btn-end { background: var(--surface); color: var(--white); border: 1px solid var(--border); }
  .btn-reset { background: transparent; color: var(--text-muted); }

  /* ========== SUBJECTS ========== */
  .subject-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .subject-scroll::-webkit-scrollbar { display: none; }
  
  .subject-chip {
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    white-space: nowrap;
    padding: 10px 20px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .subject-chip.active {
    background: var(--white);
    border-color: var(--white);
    color: var(--navy);
    font-weight: 600;
  }

  /* ========== STATS GRID ========== */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .stat-box {
    background: transparent;
    border-radius: 8px;
    text-align: center;
  }
  .stat-val {
    font-size: 1.6rem;
    font-weight: 200;
    color: var(--white);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* ========== PROGRESS BAR ========== */
  .prog-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .prog-bar-wrap {
    height: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    overflow: hidden;
  }
  .prog-bar {
    height: 100%;
    background: var(--yellow);
    width: 0%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .prog-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }
  .btn-link {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.75rem;
    text-decoration: underline;
    cursor: pointer;
  }

  /* ========== CALENDAR ========== */
  .cal-header {
    text-align: center;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 20px;
    color: var(--white);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    text-align: center;
    font-size: 0.75rem;
  }
  .cal-day-header {
    font-weight: 600;
    color: var(--text-muted);
    font-size: 0.65rem;
    padding-bottom: 8px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
  }
  .cal-day.goal-met { background: var(--yellow); color: var(--navy); font-weight: 600; }
  .cal-day.goal-missed { background: var(--red); color: var(--white); font-weight: 600; }
  .cal-day.goal-today { border: 1px solid var(--white); color: var(--white); font-weight: 600; }

  /* ========== SESSION LOG ========== */
  .session-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .session-row:last-child { border-bottom: none; padding-bottom: 0; }
  
  .session-info { display: flex; align-items: center; gap: 16px; }
  .session-subject { font-weight: 600; font-size: 0.85rem; color: var(--white); min-width: 60px;}
  .session-duration { font-weight: 400; font-size: 0.9rem; color: var(--text-muted); }
  .session-ts { font-size: 0.75rem; color: var(--text-muted); }
  .empty-state { color: var(--text-muted); text-align: center; padding: 20px 0; font-size: 0.85rem; }

  /* ========== ACHIEVEMENTS ========== */
  .ach-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .ach-item:last-child { border-bottom: none; padding-bottom: 0; }
  .ach-item.unlocked { opacity: 1; }
  .ach-icon { font-size: 1.5rem; filter: grayscale(1); }
  .ach-item.unlocked .ach-icon { filter: grayscale(0); }
  .ach-text h4 { font-size: 0.85rem; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .ach-text p { font-size: 0.75rem; color: var(--text-muted); }

  /* ========== TOAST ========== */
  .toast {
    position: fixed;
    top: max(20px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%) translateY(-200%);
    background: var(--white);
    color: var(--navy);
    font-weight: 600;
    font-size: 0.85rem;
    padding: 14px 24px;
    border-radius: 30px;
    z-index: 999;
    opacity: 0;
    white-space: nowrap;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ========== CUSTOM SUBJECT INPUT ========== */
  .add-subject-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .add-subject-row input {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--white);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
  }
  .add-subject-row input::placeholder { color: var(--text-muted); }
  .add-subject-row input:focus { border-color: var(--white); }
  .btn-add-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 16px;
    color: var(--white);
    font-family: inherit;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="shell">

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- SCROLL CONTENT -->
  <div class="content" id="mainContent">

    <!-- ===== TAB 1: TIMER ===== -->
    <div class="tab-pane active" id="tab-timer">

      <!-- Ted Minimal Hero -->
      <div class="ted-hero">
        <div class="quote-container">
          <p id="quoteText">"I believe in you more than I believe in biscuits."</p>
        </div>
        <div class="img-wrap">
          <img src="Untitled (2).png" alt="Coach">
        </div>
      </div>

      <!-- Timer card -->
      <div class="card">
        <div class="clock-wrap">
          <div class="clock-display" id="clockDisplay">00:00:00</div>
          <div class="session-label" id="sessionLabel">Ready to begin</div>
        </div>
        <div class="controls">
          <button class="btn btn-start" id="startBtn" onclick="startStop()">Start</button>
          <button class="btn btn-end" onclick="stopSession()">Stop</button>
          <button class="btn btn-reset" onclick="resetTimer()">Reset</button>
        </div>
      </div>

      <!-- Subject card -->
      <div class="card">
        <div class="card-label">Focus Area</div>
        <div class="subject-scroll" id="subjectRow">
          <button class="subject-chip active" onclick="setSubject(this,'GS')">GS</button>
          <button class="subject-chip" onclick="setSubject(this,'Optional')">Optional</button>
          <button class="subject-chip" onclick="setSubject(this,'CLASS')">CLASS</button>
          <button class="subject-chip" onclick="setSubject(this,'CSAT')">CSAT</button>
        </div>
        <div class="add-subject-row">
          <input type="text" id="customInput" placeholder="New subject..." maxlength="18">
          <button class="btn-add-chip" onclick="addCustomSubject()">Add</button>
        </div>
      </div>

    </div><!-- /tab-timer -->

    <!-- ===== TAB 2: PROGRESS ===== -->
    <div class="tab-pane" id="tab-progress">

      <div class="card">
        <div class="card-label">Session Overview</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-val" id="totalTime">0h</div>
            <div class="stat-lbl">Total</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="sessionCount">0</div>
            <div class="stat-lbl">Sessions</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="longestSession">0m</div>
            <div class="stat-lbl">Longest</div>
          </div>
        </div>
      </div>

      <!-- Daily goal -->
      <div class="card">
        <div class="card-label">Daily Goal (8 Hours)</div>
        <div class="prog-header">
          <span id="goalProgressText" style="color:var(--white);">0h 0m</span>
          <span id="goalPct">0%</span>
        </div>
        <div class="prog-bar-wrap">
          <div class="prog-bar" id="goalProgressBar"></div>
        </div>
        <div class="prog-stats">
          <span style="font-size:0.75rem;color:var(--text-muted);">Resetting at midnight</span>
          <button class="btn-link" onclick="resetTodayGoal()">Clear Today</button>
        </div>
      </div>

      <!-- Calendar -->
      <div class="card">
        <div class="cal-header" id="calMonth">Month Year</div>
        <div class="cal-grid" id="calendarGrid"></div>
      </div>

    </div><!-- /tab-progress -->

    <!-- ===== TAB 3: LOG & TROPHIES ===== -->
    <div class="tab-pane" id="tab-log">
      
      <div class="card">
        <div class="card-label">Activity Log</div>
        <div id="sessionsList">
          <div class="empty-state">No sessions recorded.</div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Trophy Cabinet</div>
        <div id="achievementsList"></div>
      </div>

    </div><!-- /tab-log -->

  </div><!-- /content -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('timer', this)">
      <span class="nav-icon">⏱</span>
      <span class="nav-label">Timer</span>
    </button>
    <button class="nav-item" onclick="switchTab('progress', this)">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Stats</span>
    </button>
    <button class="nav-item" onclick="switchTab('log', this)">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Records</span>
    </button>
  </nav>

</div><!-- /shell -->

<script>
// ======== TAB SWITCHING ========
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('mainContent').scrollTop = 0;
}

// ======== QUOTES ========
const quotes = [
  "I believe in you more than I believe in biscuits.",
  "Taking on a challenge is a lot like riding a horse.",
  "Be curious, not judgmental.",
  "Doing the right thing is never the wrong thing.",
  "You say impossible, but all I hear is 'I'm possible.'",
  "Focus. Breathe. You got this.",
  "Consistency is what separates great from good."
];

let currentQuoteIndex = 0;
let quoteInterval;

function showQuote(text) {
  const el = document.getElementById('quoteText');
  el.classList.add('fade');
  setTimeout(() => { el.textContent = `"${text}"`; el.classList.remove('fade'); }, 400);
}

function nextRandomQuote() {
  let next;
  do { next = Math.floor(Math.random() * quotes.length); } while (next === currentQuoteIndex);
  currentQuoteIndex = next;
  showQuote(quotes[currentQuoteIndex]);
}

function startQuoteRotation() { quoteInterval = setInterval(nextRandomQuote, 15000); }
function stopQuoteRotation() { clearInterval(quoteInterval); }

// ======== ACHIEVEMENTS ========
const ACHIEVEMENTS = {
  'first_session': { icon: '🏅', title: 'Kickoff', desc: 'Complete your first session.' },
  'one_hour':      { icon: '🔥', title: 'Warming Up', desc: 'Focus for 1 hour in a day.' },
  'four_hours':    { icon: '⚡', title: 'Half Time', desc: 'Focus for 4 hours in a day.' },
  'eight_hours':   { icon: '🏆', title: 'Full Match', desc: 'Hit the 8-hour daily goal.' }
};

let unlockedAchievements = JSON.parse(localStorage.getItem('studyAchievementsMobile') || '{}');

function unlock(id) {
  if (unlockedAchievements[id]) return;
  unlockedAchievements[id] = true;
  localStorage.setItem('studyAchievementsMobile', JSON.stringify(unlockedAchievements));
  showToast(`Unlocked: ${ACHIEVEMENTS[id].title}`);
  renderAchievements();
}

function checkAchievements(tempTotal, tempSessionSecs) {
  if (sessions.length > 0) unlock('first_session');
  if (totalStudiedToday >= 3600 || tempTotal >= 3600) unlock('one_hour');
  if (totalStudiedToday >= 14400 || tempTotal >= 14400) unlock('four_hours');
  if (totalStudiedToday >= 28800 || tempTotal >= 28800) unlock('eight_hours');
}

function renderAchievements() {
  const list = document.getElementById('achievementsList');
  list.innerHTML = Object.entries(ACHIEVEMENTS).map(([id, ach]) => `
    <div class="ach-item ${unlockedAchievements[id] ? 'unlocked' : ''}">
      <span class="ach-icon">${ach.icon}</span>
      <div class="ach-text">
        <h4>${ach.title}</h4>
        <p>${ach.desc}</p>
      </div>
    </div>
  `).join('');
}

// ======== TIMER ========
const GOAL_SECONDS = 8 * 3600;
let timerInterval = null;
let elapsed = 0;
let startTime = null;
let running = false;
let currentSubject = 'GS';
let sessions = [];
let totalStudiedToday = 0;
let dailyData = JSON.parse(localStorage.getItem('studyTrackerDataMobile') || '{}');

function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }
function formatElapsed(ms) {
  const s = Math.floor(ms/1000);
  return `${pad(s/3600)}:${pad((s%3600)/60)}:${pad(s%60)}`;
}
function formatDuration(secs) {
  const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=secs%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${s}s`;
  return `${s}s`;
}

function updateDisplay() {
  const now = running ? elapsed + (Date.now() - startTime) : elapsed;
  document.getElementById('clockDisplay').textContent = formatElapsed(now);
  const tempTotal = totalStudiedToday + Math.floor(now/1000);
  checkAchievements(tempTotal, Math.floor(now/1000));
}

function startStop() {
  const btn = document.getElementById('startBtn');
  if (!running) {
    running = true;
    startTime = Date.now();
    timerInterval = setInterval(updateDisplay, 1000);
    btn.textContent = 'Pause';
    btn.className = 'btn btn-stop';
    document.getElementById('clockDisplay').classList.add('running');
    document.getElementById('sessionLabel').textContent = `Focusing: ${currentSubject}`;
    startQuoteRotation();
  } else {
    running = false;
    elapsed += Date.now() - startTime;
    clearInterval(timerInterval);
    btn.textContent = 'Resume';
    btn.className = 'btn btn-start';
    document.getElementById('clockDisplay').classList.remove('running');
    document.getElementById('sessionLabel').textContent = 'Paused';
    stopQuoteRotation();
  }
}

function stopSession() {
  if (!running && elapsed === 0) return; // Nothing to stop
  saveSession();
  
  running = false;
  elapsed = 0;
  clearInterval(timerInterval);
  
  document.getElementById('clockDisplay').textContent = '00:00:00';
  document.getElementById('clockDisplay').classList.remove('running');
  document.getElementById('startBtn').textContent = 'Start';
  document.getElementById('startBtn').className = 'btn btn-start';
  document.getElementById('sessionLabel').textContent = 'Session saved';
  
  stopQuoteRotation();
  nextRandomQuote();
  showToast("Session stopped and logged.");
}

function resetTimer() {
  if (elapsed > 0 || running) {
    if(!confirm("Discard current session without saving?")) return;
  }
  
  running = false; 
  elapsed = 0;
  clearInterval(timerInterval);
  
  document.getElementById('clockDisplay').textContent = '00:00:00';
  document.getElementById('clockDisplay').classList.remove('running');
  document.getElementById('startBtn').textContent = 'Start';
  document.getElementById('startBtn').className = 'btn btn-start';
  document.getElementById('sessionLabel').textContent = 'Ready to begin';
  
  stopQuoteRotation();
  nextRandomQuote();
}

function saveSession() {
  const duration = running ? elapsed + (Date.now()-startTime) : elapsed;
  const secs = Math.floor(duration/1000);
  if (secs < 5) return; // Ignore sessions shorter than 5 seconds
  
  sessions.push({ subject: currentSubject, duration: secs, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
  totalStudiedToday += secs;
  
  const today = getTodayStr();
  dailyData[today] = (dailyData[today]||0) + secs;
  localStorage.setItem('studyTrackerDataMobile', JSON.stringify(dailyData));
  
  renderSessions();
  updateStats();
  updateGoalUI();
  renderCalendar();
  checkAchievements(totalStudiedToday, secs);
}

// ======== SUBJECTS ========
function setSubject(el, name) {
  document.querySelectorAll('.subject-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentSubject = name;
}
function addCustomSubject() {
  const input = document.getElementById('customInput');
  const val = input.value.trim();
  if (!val) return;
  const chip = document.createElement('button');
  chip.className = 'subject-chip';
  chip.textContent = val;
  chip.onclick = function(){ setSubject(this, val); };
  document.getElementById('subjectRow').appendChild(chip);
  setSubject(chip, val);
  input.value = '';
}
document.getElementById('customInput').addEventListener('keypress', e => { if(e.key==='Enter') addCustomSubject(); });

// ======== RENDER ========
function renderSessions() {
  const list = document.getElementById('sessionsList');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty-state">No sessions recorded today.</div>';
    return;
  }
  list.innerHTML = sessions.slice().reverse().map(s=>`
    <div class="session-row">
      <div class="session-info">
        <span class="session-subject">${s.subject}</span>
        <span class="session-duration">${formatDuration(s.duration)}</span>
      </div>
      <span class="session-ts">${s.time}</span>
    </div>
  `).join('');
}

function updateStats() {
  const h=Math.floor(totalStudiedToday/3600), m=Math.floor((totalStudiedToday%3600)/60);
  document.getElementById('totalTime').textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
  document.getElementById('sessionCount').textContent = sessions.length;
  const longest = sessions.length ? Math.max(...sessions.map(s=>s.duration)) : 0;
  document.getElementById('longestSession').textContent = `${Math.floor(longest/60)}m`;
}

function updateGoalUI() {
  const today = getTodayStr();
  const secs = dailyData[today] || 0;
  let pct = Math.min(100, (secs/GOAL_SECONDS)*100);
  document.getElementById('goalProgressBar').style.width = pct+'%';
  document.getElementById('goalProgressBar').style.background = pct>=100 ? '#22c55e' : 'var(--yellow)';
  const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60);
  document.getElementById('goalProgressText').textContent = `${h}h ${m}m`;
  document.getElementById('goalPct').textContent = `${Math.round(pct)}%`;
}

function resetTodayGoal() {
  if(!confirm("Clear today's logs?")) return;
  const today=getTodayStr(); dailyData[today]=0;
  localStorage.setItem('studyTrackerDataMobile', JSON.stringify(dailyData));
  sessions=[]; totalStudiedToday=0;
  renderSessions(); updateStats(); updateGoalUI(); renderCalendar();
  showToast("Logs cleared.");
}

function renderCalendar() {
  const grid=document.getElementById('calendarGrid'); grid.innerHTML='';
  ['S','M','T','W','T','F','S'].forEach(d=>{ const el=document.createElement('div'); el.className='cal-day-header'; el.textContent=d; grid.appendChild(el); });
  const now=new Date(), year=now.getFullYear(), month=now.getMonth(), today=now.getDate();
  document.getElementById('calMonth').textContent = now.toLocaleString('default',{month:'long',year:'numeric'});
  for(let i=0;i<new Date(year,month,1).getDay();i++){ const el=document.createElement('div'); grid.appendChild(el); }
  for(let i=1;i<=new Date(year,month+1,0).getDate();i++){
    const el=document.createElement('div'); el.className='cal-day'; el.textContent=i;
    const dayStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(i).padStart(2,'0');
    const s=dailyData[dayStr]||0;
    if(s>=GOAL_SECONDS) el.classList.add('goal-met');
    else if(i<today) el.classList.add('goal-missed');
    else if(i===today) el.classList.add('goal-today');
    grid.appendChild(el);
  }
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ======== INIT ========
window.onload = () => {
  showQuote(quotes[0]);
  const today=getTodayStr();
  totalStudiedToday=dailyData[today]||0;
  updateStats(); updateGoalUI(); renderCalendar(); renderAchievements();
};
</script>
